<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio 1 - Paleta Dinámica</title>
    <link rel="stylesheet" href="./style.scss" />
  </head>
  <body>
    <header>
      <a href="/">← Volver al índice</a>
      <h1>Ejercicio 4: Grid Card</h1>
    </header>

    <article class="card">
      <div class="card-image">
        <img src="./assets/lotus.jpg" alt="Sacred Lotus" />
      </div>

      <div class="card-content">
        <h3 class="card-title">Title</h3>
        <p class="card-description">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do
          eiusmod tempor incididunt ut labore et dolore magna aliqua.
        </p>

        <div class="card-footer">
          <p class="published-label">
            Published:
            <time datetime="2025-04-05" class="date">April 5, 2025</time>
          </p>
          <button class="btn-more">More Info</button>
        </div>
      </div>
    </article>
  </body>
</html>
